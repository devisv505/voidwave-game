<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="1" stop-color="#05070f"/>
    </linearGradient>
    <radialGradient id="auraP" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff2d9b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff2d9b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38e1ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38e1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#ff5bb0"/>
      <stop offset="0.62" stop-color="#a44bff"/>
      <stop offset="1" stop-color="#160024"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="330" cy="315" rx="430" ry="430" fill="url(#auraP)"/>
  <ellipse cx="980" cy="120" rx="360" ry="360" fill="url(#auraC)"/>

  <!-- grid -->
  <g stroke="#3fd0ff" stroke-opacity="0.07" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M90 0 V630 M180 0 V630 M270 0 V630 M360 0 V630 M450 0 V630 M540 0 V630 M630 0 V630 M720 0 V630 M810 0 V630 M900 0 V630 M990 0 V630 M1080 0 V630"/>
  </g>

  <!-- void ring -->
  <g transform="translate(295,315)">
    <circle r="168" fill="none" stroke="#8af3ff" stroke-width="5" opacity="0.95"/>
    <circle r="168" fill="none" stroke="#38e1ff" stroke-width="13" opacity="0.25"/>
    <circle r="82" fill="url(#core)"/>
    <circle r="18" fill="#060009"/>
  </g>

  <!-- wordmark -->
  <text x="560" y="288" font-family="'Arial Black','Arial',sans-serif" font-weight="900"
        font-size="64" letter-spacing="3" fill="#eef7ff">VOIDWAVE</text>
  <text x="562" y="338" font-family="'Courier New',monospace" font-size="21"
        letter-spacing="3" fill="#8af3ff">belt automation in the dark</text>

  <!-- cta pill -->
  <rect x="562" y="378" width="286" height="56" rx="10" fill="#38e1ff"/>
  <text x="705" y="414" text-anchor="middle" font-family="'Arial',sans-serif" font-weight="700"
        font-size="23" fill="#06101a">WISHLIST ON STEAM</text>
  <text x="562" y="488" font-family="'Arial',sans-serif" font-size="21" fill="#9aa7c7">Mine · Build · Automate · Survive the Surge</text>
